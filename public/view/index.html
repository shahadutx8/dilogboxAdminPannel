<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics View</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .topbar { background: #1e293b; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
  .topbar h1 { font-size: 15px; font-weight: 700; color: #f8fafc; }
  .topbar .badge { font-size: 11px; background: #0f172a; color: #64748b; padding: 4px 10px; border-radius: 20px; }
  .main { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #1e293b; border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 30px; font-weight: 700; color: #38bdf8; }
  .stat-value.red { color: #ef4444; }
  .stat-value.yellow { color: #f59e0b; }
  .stat-value.green { color: #22c55e; }
  .card { background: #1e293b; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 64px; }
  .chart-bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .chart-bar { width: 100%; background: #3b82f6; border-radius: 3px 3px 0 0; min-height: 2px; }
  .chart-bar-label { font-size: 9px; color: #475569; white-space: nowrap; }
  .chart-empty { font-size: 12px; color: #475569; text-align: center; padding: 20px 0; }
  .info-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #0f172a; font-size: 12px; }
  .info-row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }
  .info-key { color: #64748b; }
  .info-val { color: #e2e8f0; font-family: monospace; }
  .refresh-btn { background: #334155; color: #94a3b8; border: none; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; }
  .refresh-btn:hover { background: #475569; color: #f1f5f9; }
  .last-updated { font-size: 11px; color: #475569; margin-top: 12px; text-align: center; }
  .err { color: #ef4444; font-size: 13px; text-align: center; padding: 40px; }
  .loading { color: #475569; font-size: 13px; text-align: center; padding: 40px; }
</style>
</head>
<body>
<div class="topbar">
  <h1 id="app-title">📊 Analytics View</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
    <span class="badge">Read-only</span>
  </div>
</div>
<div class="main">
  <div id="content"><div class="loading">লোড হচ্ছে...</div></div>
  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const API_KEY = pathParts[1] || '';
const API = window.location.origin + '/api/public/' + API_KEY + '/stats';

async function load() {
  const el = document.getElementById('content');
  try {
    const r = await fetch(API);
    if (!r.ok) { el.innerHTML = '<div class="err">App পাওয়া যায়নি।</div>'; return; }
    const d = await r.json();
    document.getElementById('app-title').textContent = '📊 ' + (d.app_name || 'Analytics View');
    document.title = (d.app_name || 'Analytics') + ' — Stats';
    document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en');
    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">মোট Hit</div><div class="stat-value">${d.total.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">আজকের Hit</div><div class="stat-value green">${d.today.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Flagged IP</div><div class="stat-value red">${d.flagged_ips}</div></div>
        <div class="stat-card"><div class="stat-label">IPv6 Records</div><div class="stat-value yellow">${d.ipv6_records}</div></div>
        <div class="stat-card"><div class="stat-label">Device Records</div><div class="stat-value yellow">${d.device_records}</div></div>
      </div>

      <div class="card">
        <div class="card-title">গত ২৪ ঘণ্টা (Hourly)</div>
        ${renderChart(d.hourly)}
      </div>

      <div class="card">
        <div class="card-title">তথ্য সারসংক্ষেপ</div>
        <div class="info-row"><span class="info-key">App</span><span class="info-val">${esc(d.app_name)}</span></div>
        <div class="info-row"><span class="info-key">সর্বমোট Hits</span><span class="info-val">${d.total.toLocaleString()}</span></div>
        <div class="info-row"><span class="info-key">আজকের Hits (২৪h)</span><span class="info-val">${d.today.toLocaleString()}</span></div>
        <div class="info-row"><span class="info-key">Flagged IPs</span><span class="info-val" style="color:#ef4444">${d.flagged_ips}</span></div>
        <div class="info-row"><span class="info-key">IPv6 রেকর্ড</span><span class="info-val" style="color:#f59e0b">${d.ipv6_records}</span></div>
        <div class="info-row"><span class="info-key">Device ID রেকর্ড</span><span class="info-val" style="color:#f59e0b">${d.device_records}</span></div>
      </div>
    `;
  } catch (e) { el.innerHTML = '<div class="err">লোড করতে ব্যর্থ।</div>'; }
}

function renderChart(hourly) {
  if (!hourly || !hourly.length) return '<div class="chart-empty">এখনো কোনো hit নেই</div>';
  const max = Math.max(...hourly.map(h => parseInt(h.count)), 1);
  return `<div class="chart-bars">${hourly.map(h => {
    const count = parseInt(h.count);
    const pct = Math.max((count / max) * 56, 2);
    const label = new Date(h.hour).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', hour12: false });
    return `<div class="chart-bar-col" title="${label}: ${count}">
      <div class="chart-bar" style="height:${pct}px"></div>
      <div class="chart-bar-label">${label.slice(0,5)}</div>
    </div>`;
  }).join('')}</div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
setInterval(load, 60000);
</script>
</body>
</html>
